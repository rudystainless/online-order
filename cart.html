<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【診断モード】ショッピングカート - RUDY</title>
    <style>
        /* --- 基本設定 --- */
        body { font-family: "Helvetica Neue", Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background-color: #ffebeb; color: #333; border: 5px solid red; }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; text-align: center; color: red; }

        /* --- 診斷面板 --- */
        #debugPanel {
            background: #333; color: #0f0; padding: 15px; margin-bottom: 20px;
            font-family: monospace; font-size: 12px; border-radius: 5px;
            max-height: 200px; overflow-y: auto;
        }

        /* --- 購物車列表 --- */
        #cartList { list-style: none; padding: 0; margin-bottom: 30px; background: white; }
        .cart-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; border-bottom: 1px solid #eee;
            position: relative; z-index: 1;
        }
        
        .item-info { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        
        /* --- 按鈕區域 (極端強調) --- */
        .qty-wrapper { 
            display: flex; align-items: center; gap: 10px; margin-left: auto; 
            background: #eef; padding: 5px; border: 2px solid blue; /* 視覺除錯 */
            position: relative; z-index: 9999;
        }
        
        .qty-btn { 
            width: 50px; height: 50px; 
            background: #ddd; border: 2px solid black; font-size: 20px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        
        .remove-btn { 
            width: 50px; height: 50px; 
            background: red; color: white; border: 2px solid black; font-size: 24px; 
            cursor: pointer; margin-left: 10px;
        }

        /* --- 其他 --- */
        .total-area { text-align: right; font-size: 18px; font-weight: bold; margin-bottom: 30px; padding: 15px; background: #fff; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; background: #333; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>⚠️ 診斷模式 (Diagnostic Mode) ⚠️</h2>
    
    <div id="debugPanel">System Log:<br></div>

    <div style="margin-bottom: 20px;">
        <button onclick="window.injectFakeData()" style="padding: 10px; background: blue; color: white;">1. 注入假資料 (Inject Fake Data)</button>
        <button onclick="window.clearLocalStorage()" style="padding: 10px; background: red; color: white;">2. 清除所有資料 (Clear All)</button>
    </div>

    <ul id="cartList"></ul>
    <div class="total-area">合計: ¥<span id="totalPrice">0</span></div>

    <div class="btn-group">
        <button class="btn" onclick="alert('Checkout disabled in diagnostic mode')">注文不可 (診斷中)</button>
    </div>

    <script>
        // --- 診斷日誌工具 ---
        function log(msg) {
            const panel = document.getElementById('debugPanel');
            const time = new Date().toLocaleTimeString();
            panel.innerHTML += `[${time}] ${msg}<br>`;
            console.log(`[Diagnostic] ${msg}`);
            panel.scrollTop = panel.scrollHeight;
        }

        // --- 1. 錯誤捕捉 (全域) ---
        window.onerror = function(msg, url, line) {
            alert("致命錯誤 (Fatal Error):\n" + msg + "\nLine: " + line);
            log("ERROR: " + msg);
            return true;
        };

        // --- 2. 注入假資料 (測試用) ---
        window.injectFakeData = function() {
            log("注入測試資料...");
            const fakeData = [
                { name: "TEST ITEM A", price: 1000, qty: 1, img: "" },
                { name: "TEST ITEM B", price: 2500, qty: 2, img: "" }
            ];
            localStorage.setItem('rudy_cart', JSON.stringify(fakeData));
            log("資料已寫入 localStorage");
            window.renderCart();
        };

        // --- 3. 清除資料 ---
        window.clearLocalStorage = function() {
            log("清除 localStorage...");
            localStorage.removeItem('rudy_cart');
            window.renderCart();
        };

        // --- 4. 核心渲染 (含除錯檢查) ---
        window.renderCart = function() {
            try {
                log("開始渲染 (Render Start)...");
                const list = document.getElementById('cartList');
                if (!list) throw new Error("找不到 #cartList 元素!");

                let cartRaw = localStorage.getItem('rudy_cart');
                log("讀取資料: " + (cartRaw ? cartRaw.substring(0, 50) + "..." : "null"));

                let cart = [];
                try {
                    cart = JSON.parse(cartRaw || '[]');
                } catch(e) {
                    log("JSON 解析失敗，重置資料");
                    cart = [];
                }

                if (!Array.isArray(cart)) cart = [];

                list.innerHTML = '';
                let total = 0;

                if (cart.length === 0) {
                    list.innerHTML = '<li style="padding:20px; text-align:center;">購物車是空的 (Cart is empty)</li>';
                    document.getElementById('totalPrice').innerText = "0";
                    return;
                }

                cart.forEach((item, index) => {
                    let qty = parseInt(item.qty);
                    if (isNaN(qty)) qty = 1;
                    let price = parseInt(item.price);
                    if (isNaN(price)) price = 0;

                    total += price * qty;

                    // 生成 HTML (加上 onclick Log)
                    list.innerHTML += `
                        <li class="cart-item">
                            <div class="item-info">
                                <b>${item.name}</b> (¥${price})
                            </div>
                            
                            <div class="qty-wrapper">
                                <button type="button" class="qty-btn" onclick="window.debugUpdateQty(${index}, -1)">−</button>
                                <span style="margin: 0 10px; font-weight:bold;">${qty}</span>
                                <button type="button" class="qty-btn" onclick="window.debugUpdateQty(${index}, 1)">+</button>
                                <button type="button" class="remove-btn" onclick="window.debugRemoveItem(${index})">×</button>
                            </div>
                        </li>`;
                });

                document.getElementById('totalPrice').innerText = total.toLocaleString();
                log("渲染完成 (Render Complete)");

            } catch (err) {
                log("渲染崩潰: " + err.message);
                alert("渲染崩潰: " + err.message);
            }
        };

        // --- 5. 操作邏輯 (含除錯) ---
        window.debugUpdateQty = function(index, change) {
            log(`點擊: updateQty(${index}, ${change})`);
            
            let cart = JSON.parse(localStorage.getItem('rudy_cart') || '[]');
            let currentQty = parseInt(cart[index].qty) || 1;
            let newQty = currentQty + change;

            log(`計算: ${currentQty} -> ${newQty}`);

            if (newQty <= 0) {
                log("觸發刪除邏輯 (Delete Logic)");
                if(confirm("確定刪除? (Confirm Delete)")) {
                    cart.splice(index, 1);
                    log("已刪除項目");
                } else {
                    cart[index].qty = 1;
                    log("取消刪除");
                }
            } else {
                cart[index].qty = newQty;
            }

            localStorage.setItem('rudy_cart', JSON.stringify(cart));
            window.renderCart();
        };

        window.debugRemoveItem = function(index) {
            log(`點擊: removeItem(${index})`);
            if(confirm("確定刪除? (Confirm Delete)")) {
                let cart = JSON.parse(localStorage.getItem('rudy_cart') || '[]');
                cart.splice(index, 1);
                localStorage.setItem('rudy_cart', JSON.stringify(cart));
                log("項目已移除");
                window.renderCart();
            }
        };

        // --- 初始化 ---
        window.onload = function() {
            log("頁面載入完成 (Page Loaded)");
            // 自動注入假資料以便測試
            if (!localStorage.getItem('rudy_cart')) {
                window.injectFakeData();
            } else {
                window.renderCart();
            }
        };
    </script>
</body>
</html>
